# Noxivo Standalone Engine Stack
# Includes: workflow-engine, MongoDB, Redis
# Deployed with Dokploy — Traefik handles HTTPS routing automatically.
#
# DO NOT add manual Traefik labels — Dokploy auto-generates them from the UI domain config.
# Env vars MUST use ${VAR_NAME} syntax so Dokploy's env-var store injects them.
#
# Usage:
#   cp .env.engine.example .env.engine
#   pnpm build
#   docker-compose -f docker-compose.engine.yml up -d

version: "3.9"

networks:
  # Internal network for service-to-service comms (MongoDB, Redis)
  engine-net:
    driver: bridge
  # Dokploy's external Traefik network — required for HTTPS routing
  dokploy-network:
    external: true

volumes:
  mongo-data:
  redis-data:

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    env_file: 
      - .env
    environment:
      MONGO_INITDB_DATABASE: noxivo
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-nexus}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    volumes:
      - mongo-data:/data/db
    networks:
      - engine-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis-data:/data
    networks:
      - engine-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Noxivo Workflow Engine ─────────────────────────────────────────────────
  workflow-engine:
    build:
      context: .
      dockerfile: apps/workflow-engine/Dockerfile
    restart: unless-stopped
    # Use expose instead of ports to let Traefik handle the internal routing 
    # and avoid host port conflicts.
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"

      # Database
      MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_USER:-nexus}:${MONGO_PASSWORD}@mongodb:27017/noxivo?authSource=admin}

      # Cache & Queues
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}

      # Messaging Provider Connection
      MESSAGING_PROVIDER_BASE_URL: ${MESSAGING_PROVIDER_BASE_URL:?MESSAGING_PROVIDER_BASE_URL is required}
      MESSAGING_PROVIDER_PROXY_BASE_URL: ${MESSAGING_PROVIDER_PROXY_BASE_URL:?MESSAGING_PROVIDER_PROXY_BASE_URL is required}
      MESSAGING_PROVIDER_API_KEY: ${MESSAGING_PROVIDER_API_KEY:?MESSAGING_PROVIDER_API_KEY is required}
      MESSAGING_PROVIDER_PROXY_AUTH_TOKEN: ${MESSAGING_PROVIDER_API_KEY}
      MESSAGING_PROVIDER_WEBHOOK_SECRET: ${MESSAGING_PROVIDER_WEBHOOK_SECRET:?MESSAGING_PROVIDER_WEBHOOK_SECRET is required}

      # CORS — set this in Dokploy env vars
      # Example: https://noxivo-admin-portal.netlify.app,https://noxivo-landing-saas.netlify.app
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS}

      # Engine public API key
      ENGINE_API_KEY: ${ENGINE_API_KEY:?ENGINE_API_KEY is required}

      # Internal PSK for dashboard → engine trusted calls
      WORKFLOW_ENGINE_INTERNAL_PSK: ${WORKFLOW_ENGINE_INTERNAL_PSK:?WORKFLOW_ENGINE_INTERNAL_PSK is required}
    networks:
      - engine-net       # Internal access to DB/Redis
      - dokploy-network  # Public access via Traefik
    labels:
      - "dokploy.main=true"
      # Explicitly specify the port for Traefik routing in case auto-discovery fails
      - "traefik.http.services.workflow-engine.loadbalancer.server.port=3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
