version: "3.9"

networks:
  engine-net:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  mongo-data:
  redis-data:

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_DATABASE: noxivo
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-nexus}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    volumes:
      - mongo-data:/data/db
    networks:
      - engine-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis-data:/data
    networks:
      - engine-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  workflow-engine:
    build:
      context: .
      dockerfile: apps/workflow-engine/Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_USER:-nexus}:${MONGO_PASSWORD}@mongodb:27017/noxivo?authSource=admin}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      MESSAGING_PROVIDER_BASE_URL: ${MESSAGING_PROVIDER_BASE_URL:?MESSAGING_PROVIDER_BASE_URL is required}
      MESSAGING_PROVIDER_PROXY_BASE_URL: ${MESSAGING_PROVIDER_PROXY_BASE_URL:?MESSAGING_PROVIDER_PROXY_BASE_URL is required}
      MESSAGING_PROVIDER_API_KEY: ${MESSAGING_PROVIDER_API_KEY:?MESSAGING_PROVIDER_API_KEY is required}
      MESSAGING_PROVIDER_PROXY_AUTH_TOKEN: ${MESSAGING_PROVIDER_API_KEY}
      MESSAGING_PROVIDER_WEBHOOK_SECRET: ${MESSAGING_PROVIDER_WEBHOOK_SECRET:?MESSAGING_PROVIDER_WEBHOOK_SECRET is required}
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS}
      ENGINE_API_KEY: ${ENGINE_API_KEY:?ENGINE_API_KEY is required}
      WORKFLOW_ENGINE_INTERNAL_PSK: ${WORKFLOW_ENGINE_INTERNAL_PSK:?WORKFLOW_ENGINE_INTERNAL_PSK is required}
    networks:
      - engine-net
      - dokploy-network
    labels:
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.nexusflow-salmen-appsworkflowengine-ktgq1b-42-web.rule=Host(`api-workflow-engine.noxivo.app`)"
      - "traefik.http.routers.nexusflow-salmen-appsworkflowengine-ktgq1b-42-web.entrypoints=web"
      - "traefik.http.services.nexusflow-salmen-appsworkflowengine-ktgq1b-42-web.loadbalancer.server.port=3000"
      - "traefik.http.routers.nexusflow-salmen-appsworkflowengine-ktgq1b-42-web.service=nexusflow-salmen-appsworkflowengine-ktgq1b-42-web"
      - "traefik.http.routers.nexusflow-salmen-appsworkflowengine-ktgq1b-42-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.nexusflow-salmen-appsworkflowengine-ktgq1b-42-websecure.rule=Host(`api-workflow-engine.noxivo.app`)"
      - "traefik.http.routers.nexusflow-salmen-appsworkflowengine-ktgq1b-42-websecure.entrypoints=websecure"
      - "traefik.http.services.nexusflow-salmen-appsworkflowengine-ktgq1b-42-websecure.loadbalancer.server.port=3000"
      - "traefik.http.routers.nexusflow-salmen-appsworkflowengine-ktgq1b-42-websecure.service=nexusflow-salmen-appsworkflowengine-ktgq1b-42-websecure"
      - "traefik.http.routers.nexusflow-salmen-appsworkflowengine-ktgq1b-42-websecure.tls.certresolver=letsencrypt"
      - "traefik.enable=true"
      - "dokploy.main=true"
      - "traefik.http.services.workflow-engine.loadbalancer.server.port=3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
