# Noxivo Standalone Dashboard Stack
# Includes: Next.js dashboard, MongoDB, Redis
# Deployed with Dokploy using explicit Traefik labels for Compose routing.
# Env vars MUST use ${VAR_NAME} syntax so Dokploy's env-var store injects them.

version: "3.9"

networks:
  dashboard-net:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  mongo-data:
  redis-data:

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    env_file: 
      - .env
    environment:
      MONGO_INITDB_DATABASE: noxivo_dashboard
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-nexus}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-nexuspassword}
    volumes:
      - mongo-data:/data/db
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redispass}"]
    volumes:
      - redis-data:/data
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      MONGODB_URI: ${MONGODB_URI:-mongodb://${MONGO_USER:-nexus}:${MONGO_PASSWORD:-nexuspassword}@mongodb:27017/noxivo_dashboard?authSource=admin}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-redispass}@redis:6379}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://noxivo.khelifi-salmen.com}
      ENGINE_API_URL: ${ENGINE_API_URL:-https://api-workflow-engine.khelifi-salmen.com}
      NEXT_PUBLIC_ENGINE_API_URL: ${NEXT_PUBLIC_ENGINE_API_URL:-https://api-workflow-engine.khelifi-salmen.com}
      ENGINE_API_KEY: ${ENGINE_API_KEY}
      MESSAGING_PROVIDER_DEFAULT_SESSION: ${MESSAGING_PROVIDER_DEFAULT_SESSION:-dev-agency-whatsapp}
      WORKFLOW_ENGINE_INTERNAL_PSK: ${WORKFLOW_ENGINE_INTERNAL_PSK:-internal-psk}
      WORKFLOW_ENGINE_INTERNAL_BASE_URL: ${WORKFLOW_ENGINE_INTERNAL_BASE_URL:-https://api-workflow-engine.khelifi-salmen.com}
      ALLOWED_CORS_ORIGINS: ${ALLOWED_CORS_ORIGINS}
      PLATFORM_OWNER_EMAIL: ${PLATFORM_OWNER_EMAIL:-owner@example.com}
      PLATFORM_OWNER_PASSWORD: ${PLATFORM_OWNER_PASSWORD:-StrongPass1!}
    networks:
      - dashboard-net
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.noxivo-dashboard.rule=Host(`noxivo.khelifi-salmen.com`)
      - traefik.http.routers.noxivo-dashboard.entrypoints=websecure
      - traefik.http.routers.noxivo-dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.noxivo-dashboard.priority=10
      - traefik.http.services.noxivo-dashboard.loadbalancer.server.port=3000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
